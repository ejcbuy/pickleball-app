<!doctype html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testsimulatie betaling — Pickleball Den Haag</title>
<style>
  :root{
    --groen-donker:#0b3d2e; --groen:#15803d; --groen-licht:#16a34a; --lime:#a3e635;
    --rood:#dc2626; --rand:#e5e7eb; --tekst:#1f2937; --tekst-zacht:#6b7280;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,var(--groen-donker),#0f2a20);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;color:var(--tekst);
  }
  .kaart{width:400px;max-width:100%;background:#fff;border-radius:16px;padding:28px 26px;box-shadow:0 24px 60px rgba(0,0,0,.35);}
  .waarschuwing{
    background:#fef3c7;border:1px solid #fde68a;color:#92400e;font-size:12.5px;font-weight:700;
    padding:10px 12px;border-radius:9px;margin-bottom:18px;text-align:center;
  }
  .logo{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
  .logo-badge{width:34px;height:34px;border-radius:9px;background:var(--lime);color:var(--groen-donker);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;}
  .logo b{font-size:15px;display:block;}
  .logo small{font-size:11px;color:var(--tekst-zacht);}
  .regel{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--rand);font-size:14px;}
  .regel:last-of-type{border-bottom:none;}
  .bedrag{font-size:26px;font-weight:800;margin:14px 0 20px 0;text-align:center;}
  button{
    width:100%;padding:12px;border-radius:9px;font-size:14px;font-weight:700;border:1px solid var(--rand);
    background:#fff;color:var(--tekst);cursor:pointer;margin-bottom:10px;font-family:inherit;
  }
  .btn-geslaagd{background:var(--groen-licht);border-color:var(--groen-licht);color:#fff;}
  .btn-geslaagd:hover{background:var(--groen);}
  .btn-mislukt{color:var(--rood);border-color:#fecaca;}
  .btn-mislukt:hover{background:#fef2f2;}
  button:disabled{opacity:.5;cursor:not-allowed;}
  .status{font-size:13px;color:var(--tekst-zacht);text-align:center;margin-top:14px;min-height:18px;}
</style>
</head>
<body>
  <div class="kaart">
    <div class="waarschuwing">⚠ TESTSIMULATIE — dit is geen echte betaalpagina, er komt geen geld bij kijken.</div>
    <div class="logo">
      <div class="logo-badge">PDH</div>
      <div><b>Pickleball Den Haag</b><small>Simulatie van Mollie-checkout</small></div>
    </div>
    <div class="regel"><span>Bundel</span><span id="bundel-naam">—</span></div>
    <div class="bedrag" id="bedrag">—</div>
    <button class="btn-geslaagd" id="btn-geslaagd">Simuleer geslaagde betaling</button>
    <button class="btn-mislukt" id="btn-mislukt">Simuleer mislukte/geannuleerde betaling</button>
    <div class="status" id="status"></div>
  </div>

<script>
  const params = new URLSearchParams(window.location.search);
  const paymentId = params.get('paymentId');
  const webhookUrl = params.get('webhookUrl');
  const redirectUrl = params.get('redirectUrl');

  document.getElementById('bundel-naam').textContent = params.get('bundel') || '—';
  const bedrag = parseFloat(params.get('bedrag') || '0');
  document.getElementById('bedrag').textContent = '€ ' + bedrag.toFixed(2).replace('.', ',');

  async function simuleer(uitkomst){
    document.getElementById('btn-geslaagd').disabled = true;
    document.getElementById('btn-mislukt').disabled = true;
    document.getElementById('status').textContent = 'Bezig met verwerken…';

    if(!paymentId || !webhookUrl || !redirectUrl){
      document.getElementById('status').textContent = 'Ontbrekende parameters — kan niet simuleren.';
      return;
    }

    try{
      const body = new URLSearchParams({ id: paymentId, simuleer: uitkomst }).toString();
      const res = await fetch(webhookUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body,
      });
      if(!res.ok){
        const tekst = await res.text();
        document.getElementById('status').textContent = 'Fout bij verwerken: ' + tekst;
        document.getElementById('btn-geslaagd').disabled = false;
        document.getElementById('btn-mislukt').disabled = false;
        return;
      }
      document.getElementById('status').textContent = 'Verwerkt — je wordt teruggestuurd…';
      setTimeout(() => { window.location.href = redirectUrl; }, 700);
    } catch(e){
      document.getElementById('status').textContent = 'Onverwachte fout: ' + e.message;
      document.getElementById('btn-geslaagd').disabled = false;
      document.getElementById('btn-mislukt').disabled = false;
    }
  }

  document.getElementById('btn-geslaagd').addEventListener('click', () => simuleer('geslaagd'));
  document.getElementById('btn-mislukt').addEventListener('click', () => simuleer('mislukt'));
</script>
</body>
</html>
